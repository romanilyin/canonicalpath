name: release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-readiness:
    name: manual release readiness check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache-dependency-path: packages/go/go.mod
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:changelog
      - run: pnpm verify
      - run: pnpm go:race
      - run: pnpm ts:pack:dry-run
      - run: pnpm js:standalone:pack:dry-run
